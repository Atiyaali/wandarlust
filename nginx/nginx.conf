worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # HTTP -> HTTPS redirect
    server {
        listen 80;
        server_name localhost;

        return 301 https://$host$request_uri;
    }

    # HTTPS SERVER
    server {
        listen 443 ssl;
        server_name localhost;

        # ssl_certificate C:/nginx-1.30.1/ssl/cert.pem;
        # ssl_certificate_key C:/nginx-1.30.1/ssl/key.pem;
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;

        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
 
        # FRONTEND served by nginx
        # location / {
        #     root C:/Users/Maaz/Downloads/wanderlust/wanderlust/frontend/dist;
        #     root /usr/share/nginx/html;   if nginx is containerized and serving static files
        #     index index.html;
        #     try_files $uri /index.html;
        # }
  # FRONTEND PROXY
    location / {
        proxy_pass http://frontend:5173/;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
    }
        # BACKEND API
        location /api/ {
            proxy_pass http://backend:8000/;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}





