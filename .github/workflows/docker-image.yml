name: Docker Image CI
on: 
  push:
    branches: ["main"]
  pull_request: 
    branches: ["main"]
jobs:
  #here docker is the job and github assign seperate server for each job to run the steps
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Build Backend Image
        run:  docker build -t atiyadocker/wanderlust-backend:${{ github.sha }} ./backend
      - name: Build Frontend Image
        run:  docker build -t atiyadocker/wanderlust-frontend:${{ github.sha }} ./frontend
      - name: push backend image
        run:  docker push atiyadocker/wanderlust-backend:${{ github.sha }}
      - name: push frontend image
        run:  docker push atiyadocker/wanderlust-frontend:${{ github.sha }}
  # deploy:
  #   runs-on: ubuntu-latest

      
      
