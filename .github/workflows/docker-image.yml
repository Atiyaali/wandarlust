name: Docker Image CI
on: 
  push:
    branches: ["main"]
  pull_request: 
    branches: ["main"]
jobs:
  #here docker is the job and github assign seperate server for each job to run the steps
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: Build Backend Image
        run: |
          docker build \
          -t atiyadocker/wanderlust-backend:${{ github.sha }} \
          -t atiyadocker/wanderlust-backend:latest \
          ./backend
      - name: Build Frontend Image
        run: |
          docker build \
          -t atiyadocker/wanderlust-frontend:${{ github.sha }} \
          -t atiyadocker/wanderlust-frontend:latest \
          ./frontend
      - name: Build Nginx Image
        run: |
          docker build \
          -t atiyadocker/wanderlust-nginx:${{ github.sha }} \
          -t atiyadocker/wanderlust-nginx:latest \
          ./nginx
      - name: push backend image
        run: |
          docker push atiyadocker/wanderlust-backend:${{ github.sha }}
          docker push atiyadocker/wanderlust-backend:latest
      - name: push frontend image
        run: |
          docker push atiyadocker/wanderlust-frontend:${{ github.sha }}
          docker push atiyadocker/wanderlust-frontend:latest
      - name: push nginx image
        run: |
          docker push atiyadocker/wanderlust-nginx:${{ github.sha }}
          docker push atiyadocker/wanderlust-nginx:latest
        

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{secrets.SERVER_USERNAME }}
            password: ${{secrets.SERVER_PASSWORD }}

            script: |
              cd /c/Users/Maaz/Desktop/deploy
              docker-compose pull
              docker-compose up -d
          
       
     
      
      
